<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  background:#0b0f14;
  color:#fff;
  padding:15px;
}

input, textarea, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#11161d;
  color:#fff;
}

button{
  padding:14px;
  width:100%;
  background:#ff0050;
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  cursor:pointer;
}

#output{
  height:320px;
}
</style>
</head>

<body>

<h2>🔥 Ultimate Post Generator</h2>

<input id="title" placeholder="Post Title">

<select id="category">
<option>Trending</option>
<option>Love</option>
<option>Sad</option>
<option>Beat</option>
<option>Velocity</option>
</select>

<input id="image" placeholder="Thumbnail Image URL (Required)">
<input id="video" placeholder="Video URL">

<textarea id="sections" placeholder="Intro ### Tips ### Benefits"></textarea>

<input id="btnText" placeholder="Button Text">
<input id="btnLink" placeholder="Button Link">

<button onclick="generate()">Generate Post</button>

<textarea id="output" placeholder="Generated HTML will appear here"></textarea>

<script>
function generate(){

const title = document.getElementById("title").value.trim();
const category = document.getElementById("category").value;
const image = document.getElementById("image").value.trim();
const video = document.getElementById("video").value.trim();
const sections = document.getElementById("sections").value.split("###");
const btnText = document.getElementById("btnText").value;
const btnLink = document.getElementById("btnLink").value;

/* IMAGE REQUIRED */
if(!image){
  alert("❌ Image URL required");
  return;
}

/* CLEAN CONTENT */
let content = "";

sections.forEach(sec=>{
  if(sec.trim()){
    content += `
<div class="section">
<h2>${sec.trim()}</h2>
</div>`;
  }
});

/* HOW TO USE */
content += `
<div class="section">
<h2>How to Use</h2>
<p>1. Click the button below</p>
<p>2. Open in CapCut</p>
<p>3. Export video</p>
</div>`;

/* FINAL HTML */
const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${title}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Poppins;
  background:#0b0f14;
  color:#fff;
}

.featured-img,.category{display:none}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:20px;
  margin-bottom:10px;
}

/* VIDEO */
.video-wrap{
  max-width:400px;
  margin:20px auto;
  border-radius:18px;
  overflow:hidden;
}

video{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}

/* BUTTON */
.btn{
  display:block;
  margin:20px 0;
  padding:14px;
  text-align:center;
  background:#ff0050;
  border-radius:12px;
  color:#fff;
  text-decoration:none;
}

/* SHARE */
.share{
  display:flex;
  gap:10px;
}

.share button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#11161d;
  color:#fff;
}

/* SECTION */
.section{
  margin-top:18px;
}

.section h2{
  font-size:16px;
}

/* RELATED */
.related{
  margin-top:30px;
}

.rel-card{
  display:flex;
  gap:10px;
  background:#11161d;
  border-radius:12px;
  margin-bottom:10px;
  overflow:hidden;
  cursor:pointer;
}

.rel-thumb{
  width:120px;
  height:70px;
}

.rel-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.rel-title{
  font-size:13px;
  padding:8px;
  display:flex;
  align-items:center;
}

/* RESPONSIVE */
@media(max-width:600px){
  h1{font-size:18px}
  .video-wrap{max-width:100%}
}
</style>

</head>

<body>

<img class="featured-img" src="${image}">
<div class="category">${category}</div>

<div class="container">

<h1>${title}</h1>

<div class="video-wrap">
<video controls autoplay loop>
<source src="${video}">
</video>
</div>

${content}

<a class="btn" href="${btnLink}" target="_blank">${btnText}</a>

<div class="share">
<button onclick="sharePost()">Share</button>
<button onclick="copyLink()">Copy Link</button>
</div>

<div class="related">
<h2>🔥 Related Templates</h2>
<div id="relatedList"></div>
</div>

</div>

<script>
const username = "kuldeeptech-ai";
const repo = "kld_editz";
const currentCategory = "${category}";

/* SHARE FIX */
function sharePost(){
  if(navigator.share){
    navigator.share({
      title: document.title,
      url: window.location.href
    });
  }else{
    copyLink();
    alert("Link copied (sharing not supported)");
  }
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href);
}

/* RELATED POSTS (MIN 4) */
async function loadRelated(){
  const res = await fetch(\`https://api.github.com/repos/\${username}/\${repo}/contents/posts\`);
  const data = await res.json();

  const container = document.getElementById("relatedList");
  let count = 0;

  for(const file of data){

    if(!file.name.endsWith(".html")) continue;
    if(window.location.pathname.includes(file.name)) continue;

    try{
      const raw = await fetch(file.download_url);
      const text = await raw.text();

      let catMatch = text.match(/<div class="category">(.*?)<\\/div>/);
      let postCat = catMatch ? catMatch[1] : "";

      if(postCat !== currentCategory) continue;

      let imgMatch = text.match(/class="featured-img".*src="(.*?)"/);
      if(!imgMatch) continue;

      let image = imgMatch[1];
      let title = file.name.replace(".html","").replace(/-/g," ");

      const div = document.createElement("div");
      div.className="rel-card";

      div.innerHTML=\`
        <div class="rel-thumb">
          <img src="\${image}">
        </div>
        <div class="rel-title">\${title}</div>
      \`;

      div.onclick=()=>{
        window.location.href = file.path + "?v=" + Date.now();
      }

      container.appendChild(div);

      count++;
      if(count >= 4) break;

    }catch{}
  }
}

loadRelated();
<\/script>

</body>
</html>`;

/* OUTPUT */
document.getElementById("output").value = html;

}
</script>

</body>
</html>
