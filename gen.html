<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Generator</title>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  background:red;
  color:white;
  padding:10px;
  border:none;
  width:100%;
  margin-top:10px;
}

.output{
  background:#1e293b;
  padding:10px;
  margin-top:20px;
  white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>🔥 Post Generator</h2>

<input id="title" placeholder="Post Title">
<input id="date" placeholder="Date">
<input id="video" placeholder="YouTube Embed Link">

<!-- Sections -->
<input id="sec1title" placeholder="Section 1 Title">
<textarea id="sec1" placeholder="Section 1 Content"></textarea>

<input id="sec2title" placeholder="Section 2 Title">
<textarea id="sec2" placeholder="Section 2 Content"></textarea>

<input id="sec3title" placeholder="Section 3 Title (Conclusion)">
<textarea id="sec3" placeholder="Conclusion Content"></textarea>

<button onclick="generate()">Generate HTML</button>

<div class="output" id="out"></div>

<script>
function generate(){

let title=document.getElementById("title").value;
let date=document.getElementById("date").value;
let video=document.getElementById("video").value;

let s1t=document.getElementById("sec1title").value;
let s1=document.getElementById("sec1").value;

let s2t=document.getElementById("sec2title").value;
let s2=document.getElementById("sec2").value;

let s3t=document.getElementById("sec3title").value;
let s3=document.getElementById("sec3").value;

let html=`
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title}</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
header{text-align:center;padding:12px;background:#020617;border-bottom:2px solid red;}
.container{max-width:700px;margin:auto;padding:15px;line-height:1.6;}
.video{width:100%;aspect-ratio:16/9;margin:15px 0;}
iframe{width:100%;height:100%;border:none;}
h3{color:#f87171;}
</style>

</head>

<body>

<header><h2>🔥 RAJAN ROX</h2></header>

<div class="container">

<h2>${title}</h2>
<p>${date}</p>

<div class="video">
<iframe src="${video}" allowfullscreen></iframe>
</div>

<h3>${s1t}</h3>
<p>${s1}</p>

<h3>${s2t}</h3>
<p>${s2}</p>

<h3>${s3t}</h3>
<p>${s3}</p>

</div>

</body>
</html>
`;

document.getElementById("out").innerText=html;
}
</script>

</body>
</html>
