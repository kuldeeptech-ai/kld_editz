<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator</title>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  background:red;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  margin-top:10px;
}

.output{
  background:#1e293b;
  padding:10px;
  margin-top:20px;
  white-space:pre-wrap;
}
</style>

</head>
<body>

<h2>🔥 Post Generator</h2>

<input id="title" placeholder="Post Title">
<input id="date" placeholder="Date">
<input id="video" placeholder="YouTube Embed Link">

<input id="s1t" placeholder="Section 1 Title">
<textarea id="s1"></textarea>

<input id="s2t" placeholder="Section 2 Title">
<textarea id="s2"></textarea>

<input id="s3t" placeholder="Conclusion Title">
<textarea id="s3"></textarea>

<!-- BUTTON OPTION -->
<input id="btnText" placeholder="Button Text (Download / Apply)">
<input id="btnLink" placeholder="Button Link">

<button onclick="gen()">Generate</button>

<div class="output" id="out"></div>

<script>
function gen(){

let html=`
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title.value}</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
header{text-align:center;padding:12px;background:#020617;border-bottom:2px solid red;}
.container{max-width:700px;margin:auto;padding:15px;line-height:1.6;}
.video{width:100%;aspect-ratio:16/9;margin:15px 0;}
iframe{width:100%;height:100%;border:none;}
h3{color:#f87171;}
.btn{display:block;background:red;color:white;padding:12px;text-align:center;margin-top:20px;text-decoration:none;}
</style>

</head>

<body>

<header><h2>🔥 RAJAN ROX</h2></header>

<div class="container">

<h2>${title.value}</h2>
<p>${date.value}</p>

<div class="video">
<iframe src="${video.value}" allowfullscreen></iframe>
</div>

<h3>${s1t.value}</h3>
<p>${s1.value}</p>

<h3>${s2t.value}</h3>
<p>${s2.value}</p>

<h3>${s3t.value}</h3>
<p>${s3.value}</p>

<a class="btn" href="${btnLink.value}" target="_blank">${btnText.value}</a>

</div>

</body>
</html>
`;

document.getElementById("out").innerText=html;
}
</script>

</body>
</html>
