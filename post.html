<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

/* SAME HEADER */
header{
  text-align:center;
  padding:15px;
  background:#020617;
  border-bottom:2px solid red;
}

header span{color:white;}
header b{color:red;}

/* CONTENT */
.container{
  max-width:800px;
  margin:auto;
  padding:20px;
  line-height:1.7;
}

img{
  width:100%;
  border-radius:10px;
  margin:15px 0;
}

/* FAST TEXT RENDER */
p{
  color:#ddd;
}

/* BUTTON */
.btn{
  background:red;
  padding:12px;
  border:none;
  color:white;
  margin-top:20px;
  border-radius:6px;
}

/* SMOOTH */
html{scroll-behavior:smooth;}

</style>
</head>

<body>

<header>
  <h1><span>RAJAN</span> <b>ROX</b></h1>
</header>

<div class="container" id="post"></div>

<script>
let post=JSON.parse(localStorage.getItem("post"));

document.getElementById("post").innerHTML=`
  <h2>${post.title}</h2>
  <p>${post.date}</p>

  <img loading="lazy" src="${post.image}">

  <p>
  Ye ek detailed post hai jisme aapko full information milegi.
  Ye layout fast hai aur heavy content me bhi smooth chalega.
  </p>

  <p>
  Aap yahan jitna chahe text likh sakte ho.
  Yeh page optimized hai taki slow feel na aaye.
  </p>

  <button class="btn">Use Template</button>
`;
</script>

</body>
</html>
