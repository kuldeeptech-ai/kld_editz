<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  background:#020617;
  font-weight:700;
  border-bottom:2px solid red;
}

/* SEARCH */
.search{
  padding:10px;
  text-align:center;
}

.search input{
  width:90%;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card h2{
  padding:10px;
  font-size:16px;
}
</style>

</head>

<body>

<header>🔥 RAJAN ROX</header>

<div class="search">
<input type="text" id="search" placeholder="🔍 Search...">
</div>

<div class="container" id="posts"></div>

<script>
let user="kuldeeptech-ai";
let repo="kld_editz";
let allPosts=[];

fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`)
.then(res=>res.json())
.then(data=>{
  allPosts=data.filter(f=>f.name.endsWith(".html"));
  show(allPosts.reverse());
});

function show(posts){
  let box=document.getElementById("posts");
  box.innerHTML="";

  posts.forEach(p=>{
    box.innerHTML+=`
      <div class="card" onclick="openPost('${p.path}')">
        <img src="https://picsum.photos/400/300?random=${Math.random()}">
        <h2>${p.name.replace(".html","")}</h2>
      </div>
    `;
  });
}

function openPost(path){
  window.location=path + "?v=" + Date.now();
}

// SEARCH
document.getElementById("search").oninput=e=>{
  let v=e.target.value.toLowerCase();
  show(allPosts.filter(p=>p.name.toLowerCase().includes(v)));
};
</script>

</body>
</html>
