<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJAN ROX</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#ffffff;
  color:#111;
}

/* HEADER */
header{
  padding:15px;
  border-bottom:1px solid #ddd;
  text-align:center;
  font-weight:700;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

/* POST LIST */
.post{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.post:hover{
  background:#f5f5f5;
}

.post h2{
  font-size:18px;
  margin:0;
  font-weight:600;
}

.meta{
  font-size:12px;
  color:#777;
}
</style>

</head>

<body>

<header>RAJAN ROX</header>

<div class="container" id="posts"></div>

<script>
let user="kuldeeptech-ai";
let repo="kld_editz";

fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`)
.then(res=>res.json())
.then(data=>{
  let box=document.getElementById("posts");

  data.reverse().forEach(file=>{
    if(file.name.endsWith(".html")){
      box.innerHTML+=`
        <div class="post" onclick="openPost('${file.path}')">
          <h2>${file.name.replace(".html","")}</h2>
          <div class="meta">Latest Update</div>
        </div>
      `;
    }
  });
});

function openPost(path){
  window.location=path + "?v=" + Date.now();
}
</script>

</body>
</html>
