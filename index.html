<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuldeep ROX</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  user-select:none; /* ❌ text select disable */
}

header{
  text-align:center;
  padding:12px;
  background:#020617;
  border-bottom:2px solid red;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.post{
  padding:12px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.post:hover{
  background:#1e293b;
}
</style>

</head>

<body>

<header>
  <h2>🔥 RAJAN ROX</h2>
</header>

<div class="container" id="posts">Loading...</div>

<script>
// 🔥 CHANGE THIS (YOUR USERNAME + REPO)
let user="kuldeeptech-ai";
let repo="kld_editz";

fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`)
.then(res=>res.json())
.then(data=>{
  let box=document.getElementById("posts");
  box.innerHTML="";

  data.reverse().forEach(file=>{
    if(file.name.endsWith(".html")){
      box.innerHTML+=`
        <div class="post" onclick="openPost('${file.path}')">
          ${file.name.replace(".html","")}
        </div>
      `;
    }
  });
});

function openPost(path){
  window.location=path + "?v=" + Date.now();
}
</script>

</body>
</html>
