<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Templates</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#0b0f14;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.logo{
  font-size:18px;
  font-weight:600;
}

/* SEARCH ICON */
.search-btn{
  font-size:20px;
  cursor:pointer;
}

/* SEARCH BOX */
.search-box{
  display:none;
  padding:10px;
}

.search-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#11161d;
  color:#fff;
}

/* CATEGORY BAR */
.categories{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}

.cat{
  padding:6px 12px;
  background:#11161d;
  border-radius:20px;
  font-size:12px;
  white-space:nowrap;
  cursor:pointer;
}

/* LIST */
.list{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* CARD */
.card{
  display:flex;
  gap:12px;
  background:#11161d;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.thumb{
  width:140px;
  height:80px;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.content{
  display:flex;
  align-items:center;
}

.title{
  font-size:14px;
}

/* LOAD MORE */
.load-more{
  text-align:center;
  padding:15px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#ff0050;
  color:#fff;
  cursor:pointer;
}

/* SKELETON */
.skeleton{
  height:80px;
  background:linear-gradient(90deg,#111,#222,#111);
  border-radius:10px;
  animation:load 1.5s infinite;
}

@keyframes load{
  0%{background-position:-200px}
  100%{background-position:200px}
}
</style>
</head>

<body>

<header>
<div class="logo">Kld Editz</div>
<div class="search-btn" onclick="toggleSearch()">🔍</div>
</header>

<div class="search-box" id="searchBox">
<input type="text" id="search" placeholder="Search templates...">
</div>

<!-- CATEGORY -->
<div class="categories">
<div class="cat">All</div>
<div class="cat">Trending</div>
<div class="cat">Love</div>
<div class="cat">Sad</div>
<div class="cat">Beat</div>
</div>

<!-- POSTS -->
<div class="list" id="posts"></div>

<!-- LOAD MORE -->
<div class="load-more">
<button onclick="loadMore()">Load More</button>
</div>

<script>
const username = "kuldeeptech-ai";
const repo = "kld_editz";

let allPosts = [];
let visible = 5;

/* FETCH */
async function fetchPosts(){
  const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
  const data = await res.json();

  allPosts = data.filter(f=>f.name.endsWith(".html"));
  renderPosts();
}

/* RENDER */
async function renderPosts(){
  const container = document.getElementById("posts");
  container.innerHTML = "";

  let slice = allPosts.slice(0, visible);

  for(const file of slice){
    let title = file.name.replace(".html","").replace(/-/g," ");
    let image = "https://picsum.photos/768/432";

    try{
      const raw = await fetch(file.download_url);
      const text = await raw.text();
      const match = text.match(/class="featured-img".*src="(.*?)"/);
      if(match) image = match[1];
    }catch{}

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="thumb">
        <img loading="lazy" src="${image}">
      </div>
      <div class="content">
        <div class="title">${title}</div>
      </div>
    `;

    card.onclick=()=>{
      window.location.href = file.path + "?v=" + Date.now();
    }

    container.appendChild(card);
  }
}

/* LOAD MORE */
function loadMore(){
  visible += 5;
  renderPosts();
}

/* SEARCH */
document.addEventListener("input", e=>{
  if(e.target.id==="search"){
    let val = e.target.value.toLowerCase();
    document.querySelectorAll(".card").forEach(card=>{
      card.style.display = card.innerText.toLowerCase().includes(val) ? "flex":"none";
    });
  }
});

/* TOGGLE SEARCH */
function toggleSearch(){
  let box = document.getElementById("searchBox");
  box.style.display = box.style.display==="block" ? "none":"block";
}

fetchPosts();
</script>

</body>
</html>
