<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJAN ROX</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:12px;
  background:#020617;
  border-bottom:2px solid red;
}

header h1{
  margin:0;
  font-size:26px;
}

/* LIST */
.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.post{
  padding:12px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
  transition:0.2s;
}

.post:hover{
  background:#1e293b;
}

.post h2{
  font-size:16px;
  margin:0;
}

.post p{
  font-size:12px;
  color:#aaa;
  margin:3px 0 0;
}

/* SEARCH */
.search{
  padding:10px;
  text-align:center;
}

.search input{
  width:90%;
  padding:8px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
  <h1>🔥 RAJAN ROX</h1>
</header>

<div class="search">
  <input type="text" id="search" placeholder="🔍 Search...">
</div>

<div class="container" id="posts"></div>

<script>
let allPosts=[];

fetch("posts.json")
.then(r=>r.json())
.then(data=>{
  allPosts=data.reverse();
  show(allPosts);
});

function show(posts){
  let box=document.getElementById("posts");
  box.innerHTML="";

  posts.forEach(p=>{
    box.innerHTML+=`
      <div class="post" onclick="openPost('${p.file}')">
        <h2>${p.title}</h2>
        <p>${p.date}</p>
      </div>
    `;
  });
}

function openPost(file){
  window.location=file;
}

// SEARCH
document.getElementById("search").oninput=e=>{
  let v=e.target.value.toLowerCase();
  show(allPosts.filter(p=>p.title.toLowerCase().includes(v)));
};
</script>

</body>
</html>
