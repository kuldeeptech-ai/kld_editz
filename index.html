<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kld Editz</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  background:#020617;
  border-bottom:2px solid red;
}

header h1{margin:0;font-size:32px;}
header span{color:white;}
header b{color:red;}

/* SEARCH */
.topbar{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:15px;
}

.topbar input,.topbar select{
  padding:10px;
  border-radius:8px;
  border:none;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{transform:scale(1.04);}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{padding:15px;}

.card h2{font-size:18px;}
.card p{color:#aaa;}

/* SMOOTH */
html{scroll-behavior:smooth;}

</style>
</head>

<body>

<header>
  <h1><span>RAJAN</span> <b>ROX</b></h1>
</header>

<div class="topbar">
  <input type="text" id="search" placeholder="🔍 Search...">
  <select id="category">
    <option value="all">All</option>
    <option value="capcut">CapCut</option>
    <option value="ai">AI</option>
  </select>
</div>

<div class="container" id="posts"></div>

<script>
let allPosts=[];

fetch("posts.json")
.then(res=>res.json())
.then(data=>{
  allPosts=data.reverse();
  showPosts(allPosts);
});

function showPosts(posts){
  let box=document.getElementById("posts");
  box.innerHTML="";

  posts.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="card" onclick="openPost(${i})">
        <img loading="lazy" src="${p.image}">
        <div class="card-content">
          <h2>${p.title}</h2>
          <p>${p.date}</p>
        </div>
      </div>
    `;
  });
}

function openPost(index){
  localStorage.setItem("post", JSON.stringify(allPosts[index]));
  window.location="post.html";
}

// SEARCH
document.getElementById("search").oninput=e=>{
  let v=e.target.value.toLowerCase();
  showPosts(allPosts.filter(p=>p.title.toLowerCase().includes(v)));
};

// CATEGORY
document.getElementById("category").onchange=e=>{
  let v=e.target.value;
  if(v==="all") showPosts(allPosts);
  else showPosts(allPosts.filter(p=>p.category===v));
};
</script>

</body>
</html>
