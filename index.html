<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KULDEEP ROX</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:12px;
  background:#020617;
  border-bottom:2px solid red;
  font-weight:700;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:auto;
  padding:15px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.02);
}

/* IMAGE */
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:12px;
}

.content h2{
  font-size:18px;
  margin:0;
  font-weight:600;
}

.meta{
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}

/* MOBILE */
@media(max-width:600px){
  .card img{
    height:150px;
  }
}
</style>

</head>

<body>

<header>🔥 KULDEEP ROX</header>

<div class="container" id="posts">Loading...</div>

<script>
let user="kuldeeptech-ai";
let repo="kld_editz";

fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`)
.then(res=>res.json())
.then(data=>{
  let box=document.getElementById("posts");
  box.innerHTML="";

  data.reverse().forEach(file=>{
    if(file.name.endsWith(".html")){

      let title=file.name.replace(".html","");

      box.innerHTML+=`
        <div class="card" onclick="openPost('${file.path}')">
          <img src="https://picsum.photos/600/300?random=${Math.random()}">
          <div class="content">
            <h2>${title}</h2>
            <div class="meta">Latest Update</div>
          </div>
        </div>
      `;
    }
  });
});

function openPost(path){
  window.location=path + "?v=" + Date.now();
}
</script>

</body>
</html>
