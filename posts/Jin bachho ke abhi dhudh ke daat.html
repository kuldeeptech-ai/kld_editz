⬅ Go Home
</div>

</div>

<script>
const username = "kuldeeptech-ai";
const repo = "kld_editz";
const currentCategory = "Trending";

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    goHome();
  }
}

function goHome(){
  window.location.href = "https://kuldeeptech-ai.github.io/kld_editz/";
}

function sharePost(){
  if(navigator.share){
    navigator.share({
      title: document.title,
      url: window.location.href
    }).catch(()=>copyLink());
  }else{
    copyLink();
    alert("Link copied!");
  }
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href)
  .catch(()=>prompt("Copy this link:", window.location.href));
}

async function loadRelated(){
  const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
  const data = await res.json();

  const container = document.getElementById("relatedList");
  let count = 0;

  for(const file of data){

    if(!file.name.endsWith(".html")) continue;
    if(window.location.pathname.includes(file.name)) continue;

    try{
      const raw = await fetch(file.download_url);
      const text = await raw.text();

      let cat = (text.match(/<div class="category">(.*?)<\/div>/)||[])[1];
      if(cat !== currentCategory) continue;

      let img = (text.match(/class="featured-img".*src="(.*?)"/)||[])[1];
      if(!img) continue;

      let title = file.name.replace(".html","").replace(/-/g," ");

      const div = document.createElement("div");
      div.className="rel-card";

      div.innerHTML = `
        <div class="rel-thumb">
          <img src="${img}">
        </div>
        <div class="rel-title">${title}</div>
      `;

      div.onclick = ()=>{
        window.location.href = file.path + "?v=" + Date.now();
      };

      container.appendChild(div);

      count++;
      if(count >= 4) break;

    }catch{}
  }
}

loadRelated();
</script>
