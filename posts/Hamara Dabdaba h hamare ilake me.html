<script>
const username = "kuldeeptech-ai";
const repo = "kld_editz";
const currentCategory = "Trending/attitude";

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    window.location.href = "/kld_editz/";
  }
}

function sharePost(){
  if(navigator.share){
    navigator.share({
      title: document.title,
      url: window.location.href
    });
  }else{
    copyLink();
    alert("Link copied!");
  }
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href);
}

async function loadRelated(){
  const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/posts`);
  const data = await res.json();

  const container = document.getElementById("relatedList");
  let count = 0;

  for(const file of data){

    if(!file.name.endsWith(".html")) continue;
    if(window.location.pathname.includes(file.name)) continue;

    try{
      const raw = await fetch(file.download_url);
      const text = await raw.text();

      let catMatch = text.match(/<div class="category">(.*?)<\\/div>/);
      let postCat = catMatch ? catMatch[1] : "";

      if(postCat !== currentCategory) continue;

      let imgMatch = text.match(/class="featured-img".*src="(.*?)"/);
      if(!imgMatch) continue;

      let image = imgMatch[1];
      let title = file.name.replace(".html","").replace(/-/g," ");

      const div = document.createElement("div");
      div.className="rel-card";

      div.innerHTML=`
        <div class="rel-thumb">
          <img src="${image}">
        </div>
        <div class="rel-title">${title}</div>
      `;

      div.onclick=()=>{
        window.location.href = file.path + "?v=" + Date.now();
      }

      container.appendChild(div);

      count++;
      if(count >= 4) break;

    }catch{}
  }
}

loadRelated();
</script>
